<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f4ef;--surface:#ffffff;--surface2:#eeeae3;--border:#dedad2;--text:#1a1714;--muted:#857f76;--accent:#2a5298;--accent-light:rgba(42,82,152,0.08);--green:#2a7a4a;--red:#8a2a2a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;font-size:14px;}
header{background:var(--text);color:var(--bg);padding:22px 32px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:3px solid var(--accent);}
.logo h1{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:600;color:var(--bg);line-height:1;}
.logo h1 em{font-style:italic;color:#7aadff;}
.logo p{margin-top:4px;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(247,244,239,0.35);}
.main{max-width:820px;margin:0 auto;padding:32px 24px 80px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:18px;}
.panel-label{font-size:0.62rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;}
label{display:block;font-size:0.72rem;color:var(--muted);margin-bottom:6px;}
input[type=text],input[type=password],textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:300;padding:10px 12px;outline:none;transition:border-color 0.2s;}
input:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:200px;line-height:1.7;}
.run-btn{width:100%;padding:14px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity 0.2s;}
.run-btn:hover{opacity:0.88;}.run-btn:disabled{opacity:0.4;cursor:not-allowed;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-bar{background:rgba(138,42,42,0.08);border:1px solid rgba(138,42,42,0.25);border-radius:6px;color:var(--red);padding:10px 14px;font-size:0.78rem;margin-top:12px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden;}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2);}
.card-title{font-size:0.65rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);}
.copy-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.7rem;cursor:pointer;transition:all 0.2s;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.copy-btn.copied{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.card-body{padding:22px;font-size:0.84rem;line-height:1.8;}
.card-body p{margin-bottom:10px;}
.change-notes{margin-top:16px;border-top:1px solid var(--border);padding-top:14px;}
.change-notes-toggle{font-size:0.72rem;font-weight:500;color:var(--muted);cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px;}
.change-notes-toggle:hover{color:var(--accent);}
.change-notes-list{display:none;list-style:none;margin-top:10px;}
.change-notes-list.open{display:block;}
.change-notes-list li{font-size:0.76rem;color:var(--muted);padding:4px 0 4px 12px;border-left:2px solid var(--accent-light);margin-bottom:4px;}
hr.divider{border:none;border-top:1px solid var(--border);margin:24px 0;}
</style>
</head>
<body>
<header>
  <div class="logo"><h1>Editorial <em>Assistant</em></h1><p>Church Communications Suite</p></div>
  <span style="font-size:0.65rem;color:rgba(247,244,239,0.3);border:1px solid rgba(247,244,239,0.15);padding:4px 10px;border-radius:20px">Light Edit Tool</span>
</header>
<div class="main">
  <div class="panel">
    <div class="panel-label">Article or Text</div>
    <label>Paste the text to edit</label>
    <textarea id="textInput" placeholder="Paste article, post, or any text here…"></textarea>
  </div>
  <div class="panel">
    <div class="panel-label">Context (optional)</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div><label>Author name</label><input type="text" id="authorName" placeholder="e.g. Pastor Sarah Williams"></div>
      <div><label>Publication or context</label><input type="text" id="publication" placeholder="e.g. church newsletter, website"></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-label">API Key</div>
    <input type="password" id="apiKey" placeholder="sk-ant-…">
    <p style="font-size:0.7rem;color:var(--muted);margin-top:6px">Not stored. Only used for this session.</p>
  </div>
  <button class="run-btn" id="runBtn" onclick="runEditor()">
    <div class="spinner" id="spinner" style="display:none"></div>
    <span id="btnText">Edit & Summarize</span>
  </button>
  <div class="error-bar" id="errorBar" style="display:none"></div>
  <div id="results" style="display:none">
    <hr class="divider">
    <div id="outputCards"></div>
    <div id="bioSection" style="display:none">
      <hr class="divider">
      <div class="panel">
        <div class="panel-label">Writer Bio</div>
        <p style="font-size:0.78rem;color:var(--muted);margin-bottom:14px">Generate a one-sentence factual bio for the author.</p>
        <label>Additional facts (optional)</label>
        <input type="text" id="bioNotes" placeholder="Title, church, role…">
        <button class="run-btn" id="bioBtn" onclick="runBio()" style="margin-top:14px;background:transparent;border:1px solid var(--accent);color:var(--accent)">
          <div class="spinner" id="bioSpinner" style="display:none;border-color:rgba(42,82,152,0.3);border-top-color:var(--accent)"></div>
          <span id="bioBtnText">Generate Bio</span>
        </button>
        <div class="error-bar" id="bioError" style="display:none"></div>
        <div id="bioResult"></div>
      </div>
    </div>
    <button onclick="resetForm()" style="margin-top:24px;background:transparent;border:1px solid var(--border);color:var(--muted);padding:10px 20px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.78rem;cursor:pointer">↩ Start over</button>
  </div>
</div>
<script>
const cardCopyData={};
async function callAPI(apiKey,messages,system){const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system,messages})});const data=await resp.json();if(data.error)throw new Error(data.error.message);return data.content.map(b=>b.text||'').join('');}
async function runEditor(){
  const apiKey=document.getElementById('apiKey').value.trim();if(!apiKey)return showError('Please enter your API key.');
  const text=document.getElementById('textInput').value.trim();if(!text)return showError('Please paste some text to edit.');
  const author=document.getElementById('authorName').value.trim();
  const pub=document.getElementById('publication').value.trim();
  const context=[author&&'Author: '+author,pub&&'Context: '+pub].filter(Boolean).join('\n');
  const sys='You are a light-touch editorial assistant. Improve clarity and fix errors while preserving the author\'s voice completely.';
  setLoading(true);hideError();
  document.getElementById('results').style.display='block';
  document.getElementById('outputCards').innerHTML='';
  try{
    const summaryText=await callAPI(apiKey,[{role:'user',content:`${context}\n\nTEXT:\n${text}\n\nWrite a short 1–2 sentence reader summary of this piece — what it's about and who it's for. Then on a new line write "EDIT INTENT:" followed by one sentence describing the author's main goal.`}],sys);
    const editText=await callAPI(apiKey,[{role:'user',content:`${context}\n\nTEXT:\n${text}\n\nPerform a light editorial edit:\n- Fix grammar, spelling, punctuation errors only\n- Improve clarity where sentences are genuinely confusing\n- Remove redundant phrases if they add no meaning\n- Do NOT change word choices, tone, sentence structure, or style\n- Preserve ALL of the author's voice\n\nFirst output the edited text in full.\n\nThen write "---CHANGES---" followed by a numbered list of specific changes:\n1. Fixed comma splice in paragraph 2\n2. Corrected "it's" to "its"\n\nIf minimal changes, note that.`}],sys);
    const changesSplit=editText.indexOf('---CHANGES---');
    const editedText=changesSplit>-1?editText.substring(0,changesSplit).trim():editText.trim();
    const changesRaw=changesSplit>-1?editText.substring(changesSplit+13).trim():'';
    const changeItems=changesRaw.split('\n').map(l=>l.replace(/^\d+\.\s*/,'')).filter(l=>l.trim().length>2);
    cardCopyData['summary']=summaryText;
    const summaryCard=document.createElement('div');summaryCard.className='card';
    summaryCard.innerHTML=`<div class="card-header"><span class="card-title">Reader Summary</span><button class="copy-btn" onclick="copyCard('summary',this)">Copy</button></div><div class="card-body">${summaryText.split('\n').filter(l=>l.trim()).map(l=>`<p>${esc(l)}</p>`).join('')}</div>`;
    document.getElementById('outputCards').appendChild(summaryCard);
    cardCopyData['edited']=editedText;
    const changeNotesHtml=changeItems.length?`<div class="change-notes"><div class="change-notes-toggle" onclick="toggleChangeNotes(this)">▾ What was changed <span style="background:var(--accent-light);color:var(--accent);border-radius:20px;padding:1px 8px;font-size:0.65rem;margin-left:4px">${changeItems.length}</span></div><ul class="change-notes-list open">${changeItems.map(c=>`<li>${esc(c)}</li>`).join('')}</ul></div>`:'';
    const editCard=document.createElement('div');editCard.className='card';
    editCard.innerHTML=`<div class="card-header"><span class="card-title">Edited Text</span><button class="copy-btn" onclick="copyCard('edited',this)">Copy</button></div><div class="card-body"><div>${editedText.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${esc(p.trim())}</p>`).join('')}</div>${changeNotesHtml}</div>`;
    document.getElementById('outputCards').appendChild(editCard);
    if(author)document.getElementById('bioSection').style.display='block';
  }catch(e){showError(e.message);}
  setLoading(false);
}
function toggleChangeNotes(btn){const list=btn.nextElementSibling;const isOpen=list.classList.contains('open');list.classList.toggle('open',!isOpen);btn.innerHTML=btn.innerHTML.replace(isOpen?'▾':'▸',isOpen?'▸':'▾');}
async function runBio(){
  const apiKey=document.getElementById('apiKey').value.trim();if(!apiKey)return;
  const author=document.getElementById('authorName').value.trim()||'the author';
  const notes=document.getElementById('bioNotes').value.trim();
  document.getElementById('bioBtn').disabled=true;document.getElementById('bioSpinner').style.display='block';document.getElementById('bioBtnText').textContent='Generating…';
  try{
    const text=await callAPI(apiKey,[{role:'user',content:`Write a single factual sentence bio for ${author}.${notes?' Facts: '+notes:''}\nRules: No sentiment language ("heart for","passionate about","dedicated to"). Third person. One sentence only.`}],'You write strictly factual one-sentence bios. No sentiment.');
    cardCopyData['bio']=text;
    document.getElementById('bioResult').innerHTML=`<div style="background:var(--surface2);border-radius:8px;padding:16px;margin-top:12px;font-size:0.83rem;line-height:1.75">${esc(text)}<br><button class="copy-btn" onclick="copyCard('bio',this)" style="margin-top:10px">Copy</button></div>`;
  }catch(e){document.getElementById('bioError').style.display='block';document.getElementById('bioError').textContent=e.message;}
  document.getElementById('bioBtn').disabled=false;document.getElementById('bioSpinner').style.display='none';document.getElementById('bioBtnText').textContent='Generate Bio';
}
function copyCard(id,btn){const text=cardCopyData[id]||'';const confirm=()=>{btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);};if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(text).then(confirm).catch(()=>fallbackCopy(text,btn,confirm));else fallbackCopy(text,btn,confirm);}
function fallbackCopy(text,btn,confirm){const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:-9999px;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');confirm();}catch(e){btn.textContent='Failed';setTimeout(()=>{btn.textContent='Copy';},2000);}document.body.removeChild(ta);}
function setLoading(on){document.getElementById('runBtn').disabled=on;document.getElementById('spinner').style.display=on?'block':'none';document.getElementById('btnText').textContent=on?'Editing…':'Edit & Summarize';}
function showError(msg){const e=document.getElementById('errorBar');e.style.display='block';e.textContent=msg;}
function hideError(){document.getElementById('errorBar').style.display='none';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function resetForm(){document.getElementById('textInput').value='';document.getElementById('results').style.display='none';window.scrollTo({top:0,behavior:'smooth'});}
</script>
</body>
</html>
